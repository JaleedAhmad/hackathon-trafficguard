<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Mobile UI Showcase</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#111c2d",
                    "on-surface": "#111c2d",
                    "on-surface-variant": "#434655",
                    "on-tertiary-container": "#ffede6",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-primary-container": "#eeefff",
                    "outline": "#737686",
                    "error-container": "#ffdad6",
                    "surface-dim": "#cfdaf2",
                    "surface-tint": "#0053db",
                    "on-error": "#ffffff",
                    "background": "#f9f9ff",
                    "on-tertiary-fixed": "#360f00",
                    "inverse-primary": "#b4c5ff",
                    "surface-container": "#e7eeff",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffdbcd",
                    "primary-fixed": "#dbe1ff",
                    "on-primary-fixed-variant": "#003ea8",
                    "inverse-surface": "#263143",
                    "surface-container-high": "#dee8ff",
                    "outline-variant": "#c3c6d7",
                    "secondary": "#505f76",
                    "primary-container": "#2563eb",
                    "tertiary": "#943700",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#f0f3ff",
                    "secondary-fixed-dim": "#b7c8e1",
                    "surface": "#f9f9ff",
                    "on-secondary-container": "#54647a",
                    "secondary-fixed": "#d3e4fe",

                    "primary": "#004ac6",
                    "error": "#ba1a1a",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "surface-container-highest": "#d8e3fb",
                    "inverse-on-surface": "#ecf1ff",
                    "tertiary-fixed-dim": "#ffb596"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter-mobile": "16px",
                    "margin-mobile": "16px",
                    "unit": "8px",
                    "columns-mobile": "4",
                    "safe-area-bottom": "34px"
            },
            "fontFamily": {
                    "display-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "label-lg": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                    "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased overflow-hidden w-full h-screen relative">
<!-- TopAppBar -->
<header class="bg-surface w-full top-0 sticky shadow-sm flex justify-between items-center h-16 px-4 z-40">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-150 ease-in-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Traffic Guard</h1>
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-150 ease-in-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<!-- Main Canvas Area -->
<main class="w-full h-[calc(100vh-64px)] relative overflow-y-auto pb-[200px]">
<!-- Map Section with Markers -->
<div class="relative w-full h-96 bg-surface-variant" data-alt="A highly detailed top-down view of a modern city map interface, featuring clean geometric blocks, subtle terrain lines, and a soft, light-mode color palette. The map aesthetic is minimal and corporate, utilizing varying shades of very light blue and cool gray to depict land and water, with delicate white lines for roads. The overall mood is precise, functional, and uncluttered." data-location="Urban Center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD3qQJvNcJg2IF2dLPnu5pX8bGUhXvlFFTNDJfXA_O6Q_rx_pisScKhmSY-CpUV8w4XfnSTYIb9X-yK7958bS5uRdEXTN6z-hqrq87_RkA5HLLXWNaMZ-6cAZ0Y8ayVINhN6OYCF3uClg3MapT7ALtzJzHcC2083MiG7AE29SIb4o1sPCPul5nmM3Vy9vuABGm9OubfSYyumCnspZAWhz6nFIynWsNW-6cVosFfDV9c_mrEoyLqBUbcgOSS4v8HfXM9aMFzWkBb8A'); background-size: cover; background-position: center;">
<!-- Scrim to make markers pop over map -->
<div class="absolute inset-0 bg-surface/40 backdrop-blur-[1px]"></div>
<!-- Simple Marker -->
<div class="absolute top-[20%] left-[30%] flex flex-col items-center drop-shadow-md z-10">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary shadow-[0_2px_4px_rgba(0,0,0,0.1)] border-2 border-surface">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="w-2 h-2 rotate-45 bg-primary -mt-1 border-b-2 border-r-2 border-surface"></div>
</div>
<!-- Status Marker (Warning/Alert) -->
<div class="absolute top-[40%] right-[25%] flex flex-col items-center drop-shadow-md z-10">
<div class="w-8 h-8 rounded-full bg-error flex items-center justify-center text-on-error shadow-[0_2px_4px_rgba(0,0,0,0.1)] border-2 border-surface">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="w-2 h-2 rotate-45 bg-error -mt-1 border-b-2 border-r-2 border-surface"></div>
</div>
<!-- Clustered Marker -->
<div class="absolute bottom-[30%] left-[45%] flex items-center justify-center w-11 h-11 rounded-full bg-tertiary-container text-on-tertiary-container shadow-[0_2px_8px_rgba(0,0,0,0.15)] border-2 border-surface font-label-lg text-label-lg z-10">
                12
            </div>
</div>
<!-- FAB Showcase Container (Positioned absolutely over map for demo purposes) -->
<div class="absolute top-4 right-4 flex flex-col gap-4 items-end z-20">
<!-- Extended FAB -->
<button class="h-[56px] px-6 rounded-xl bg-secondary-container text-on-secondary-container shadow-[0_10px_25px_rgba(0,0,0,0.1)] flex items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit</span>
<span class="font-label-lg text-label-lg">Compose</span>
</button>
<!-- Standard Primary FAB -->
<button class="w-[56px] h-[56px] rounded-xl bg-primary text-on-primary shadow-[0_10px_25px_rgba(0,0,0,0.1)] flex items-center justify-center hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
</div>
</main>
<!-- Persistent Bottom Sheet (Open State overlaying content, sits above BottomNavBar) -->
<div class="fixed bottom-[94px] left-0 w-full bg-surface rounded-t-xl shadow-[0_-10px_25px_rgba(0,0,0,0.08)] z-30 flex flex-col">
<!-- Drag Handle -->
<div class="w-full flex justify-center py-[12px]">
<div class="w-8 h-1 rounded-full bg-outline-variant"></div>
</div>
<!-- Sheet Content Canvas -->
<div class="px-4 pb-6">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Location Details</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Sector 7G Node Overview</p>
</div>
<button class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Bento-style data cards -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/20 flex flex-col gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[18px]">trending_up</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">Activity</span>
<span class="font-body-md text-body-md text-on-surface-variant">High Volume</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/20 flex flex-col gap-2">
<div class="w-8 h-8 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[18px]">group</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface">Personnel</span>
<span class="font-body-md text-body-md text-on-surface-variant">3 Active</span>
</div>
</div>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-[calc(8px+34px)] bg-surface-container z-50 rounded-t-xl shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
<!-- Home -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<!-- Maps (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-sm text-label-sm mt-1">Maps</span>
</button>
<!-- Alerts -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-sm text-label-sm mt-1">Alerts</span>
</button>
<!-- Profile -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity active:scale-90 duration-200">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm mt-1">Profile</span>
</button>
</nav>


</body></html>
