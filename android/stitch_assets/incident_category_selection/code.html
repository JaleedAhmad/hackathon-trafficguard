<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Category</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Hanken+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#263143",
                        "surface-container": "#e7eeff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-fixed": "#ffdbcd",
                        "tertiary": "#943700",
                        "outline": "#737686",
                        "on-background": "#111c2d",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#434655",
                        "on-surface": "#111c2d",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary-container": "#ffede6",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#505f76",
                        "inverse-on-surface": "#ecf1ff",
                        "on-primary-container": "#eeefff",
                        "error": "#ba1a1a",
                        "surface-dim": "#cfdaf2",
                        "on-tertiary-fixed": "#360f00",
                        "background": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "secondary-container": "#d0e1fb",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "primary": "#004ac6",
                        "on-secondary-container": "#54647a",
                        "surface-container-high": "#dee8ff",
                        "primary-container": "#2563eb",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d3e4fe",
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#d8e3fb",
                        "on-error": "#ffffff",
                        "tertiary-container": "#bc4800",
                        "inverse-primary": "#b4c5ff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-tint": "#0053db",
                        "on-primary-fixed": "#00174b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px",
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- Top App Bar (Task Focused) -->
<header class="flex justify-between items-center h-16 px-4 w-full bg-surface sticky top-0 z-40">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center pr-10">Report Incident</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col w-full max-w-2xl mx-auto px-4 pb-safe-area-bottom">
<!-- Search Bar -->
<div class="pt-2 pb-6">
<div class="relative w-full h-14 bg-surface-container-high rounded-full flex items-center px-4 shadow-[0_2px_4px_rgba(0,0,0,0.02)] border border-outline-variant/30 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-3">search</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-md placeholder:text-on-surface-variant/70 focus:ring-0 outline-none" placeholder="Search categories..." type="text"/>
</div>
</div>
<!-- Section Title -->
<div class="mb-4">
<h2 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Select Category</h2>
</div>
<!-- Grid Selection -->
<div class="grid grid-cols-2 gap-4 pb-8">
<!-- Category: Traffic -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">traffic</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Traffic</span>
</button>
<!-- Category: Construction -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">construction</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Construction</span>
</button>
<!-- Category: Hazard -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-error-container flex items-center justify-center text-on-error-container group-hover:bg-error group-hover:text-on-error transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Hazard</span>
</button>
<!-- Category: Police -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">local_police</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Police</span>
</button>
<!-- Category: Accident -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-error-container flex items-center justify-center text-on-error-container group-hover:bg-error group-hover:text-on-error transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">car_crash</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Accident</span>
</button>
<!-- Category: Weather -->
<button class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-6 flex flex-col items-center justify-center gap-3 aspect-square shadow-sm hover:bg-surface-container-low hover:border-primary/40 active:scale-[0.98] transition-all group">
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">cloudy_snowing</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-semibold">Weather</span>
</button>
</div>
</main>
</body></html>
