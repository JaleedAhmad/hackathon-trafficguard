<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Report Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#263143",
                        "surface-container": "#e7eeff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-fixed": "#ffdbcd",
                        "tertiary": "#943700",
                        "outline": "#737686",
                        "on-background": "#111c2d",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#434655",
                        "on-surface": "#111c2d",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary-container": "#ffede6",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#505f76",
                        "inverse-on-surface": "#ecf1ff",
                        "on-primary-container": "#eeefff",
                        "error": "#ba1a1a",
                        "surface-dim": "#cfdaf2",
                        "on-tertiary-fixed": "#360f00",
                        "background": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "secondary-container": "#d0e1fb",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "primary": "#004ac6",
                        "on-secondary-container": "#54647a",
                        "surface-container-high": "#dee8ff",
                        "primary-container": "#2563eb",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d3e4fe",
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#d8e3fb",
                        "on-error": "#ffffff",
                        "tertiary-container": "#bc4800",
                        "inverse-primary": "#b4c5ff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-tint": "#0053db",
                        "on-primary-fixed": "#00174b"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px",
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px"
                    },
                    fontFamily: {
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    fontSize: {
                        "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "500" }],
                        "headline-lg-mobile": ["28px", { lineHeight: "36px", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "label-lg": ["14px", { lineHeight: "20px", letterSpacing: "0.01em", fontWeight: "500" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom toggle styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #004ac6; /* primary */
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #004ac6; /* primary */
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md text-body-md min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header (Transactional Flow - Suppressing main navigation shell) -->
<header class="flex justify-between items-center h-16 px-4 w-full z-40 bg-surface sticky top-0 border-b border-surface-container-high">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center pr-10">Add Details</h1>
</header>
<!-- Main Content -->
<main class="flex-1 px-margin-mobile py-6 pb-[calc(80px+theme(spacing.safe-area-bottom))]">
<form class="max-w-2xl mx-auto space-y-6">
<!-- Description Section -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-[0_2px_4px_rgba(0,0,0,0.02)] border border-surface-container-highest space-y-3">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">description</span>
<label class="font-label-lg text-label-lg text-on-surface" for="description">Description</label>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mb-2">Provide specific details about the situation.</p>
<textarea class="w-full bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface placeholder-on-surface-variant/50 p-3 font-body-md text-body-md transition-colors resize-none" id="description" name="description" placeholder="E.g., Large pothole in the middle lane, causing vehicles to swerve..." rows="4"></textarea>
</div>
<!-- Time Selector Section -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-[0_2px_4px_rgba(0,0,0,0.02)] border border-surface-container-highest space-y-3">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">schedule</span>
<label class="font-label-lg text-label-lg text-on-surface" for="time_observed">Time Observed</label>
</div>
<div class="relative">
<input class="w-full bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary text-on-surface p-3 pl-10 font-body-md text-body-md transition-colors appearance-none" id="time_observed" name="time_observed" type="time" value="14:30"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">access_time</span>
</div>
</div>
<!-- Blocking Traffic Toggle Section -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-[0_2px_4px_rgba(0,0,0,0.02)] border border-surface-container-highest flex items-center justify-between">
<div class="space-y-1 pr-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
<h3 class="font-label-lg text-label-lg text-on-surface">Blocking Traffic</h3>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Does this issue impede the flow of traffic?</p>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in flex-shrink-0">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 top-0 left-0 transition-transform duration-200 ease-in-out border-surface-variant peer" id="blocking_traffic" name="blocking_traffic" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out" for="blocking_traffic"></label>
</div>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-surface-container-high px-margin-mobile pt-4 pb-[max(16px,theme(spacing.safe-area-bottom))] z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-label-lg text-label-lg rounded-full py-4 flex items-center justify-center gap-2 transition-colors active:scale-[0.98]" type="button">
<span>Next</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</div>
</body></html>
