<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Incident Severity</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f9f9ff",
                    "surface-container-low": "#f0f3ff",
                    "on-secondary": "#ffffff",
                    "inverse-surface": "#263143",
                    "surface-container": "#e7eeff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-secondary-fixed-variant": "#38485d",
                    "tertiary-fixed": "#ffdbcd",
                    "tertiary": "#943700",
                    "outline": "#737686",
                    "on-background": "#111c2d",
                    "primary-fixed": "#dbe1ff",
                    "on-surface-variant": "#434655",
                    "on-surface": "#111c2d",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-tertiary-container": "#ffede6",
                    "surface-bright": "#f9f9ff",
                    "secondary": "#505f76",
                    "inverse-on-surface": "#ecf1ff",
                    "on-primary-container": "#eeefff",
                    "error": "#ba1a1a",
                    "surface-dim": "#cfdaf2",
                    "on-tertiary-fixed": "#360f00",
                    "background": "#f9f9ff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#0b1c30",
                    "secondary-container": "#d0e1fb",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "primary": "#004ac6",
                    "on-secondary-container": "#54647a",
                    "surface-container-high": "#dee8ff",
                    "primary-container": "#2563eb",
                    "surface-container-highest": "#d8e3fb",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#d3e4fe",
                    "outline-variant": "#c3c6d7",
                    "surface-variant": "#d8e3fb",
                    "on-error": "#ffffff",
                    "tertiary-container": "#bc4800",
                    "inverse-primary": "#b4c5ff",
                    "secondary-fixed-dim": "#b7c8e1",
                    "surface-tint": "#0053db",
                    "on-primary-fixed": "#00174b"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "16px",
                    "columns-mobile": "4",
                    "unit": "8px",
                    "safe-area-bottom": "34px",
                    "gutter-mobile": "16px"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "label-lg": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                    "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- 
      TopAppBar
      Context: This is a transactional flow (reporting an incident), so the BottomNavBar is suppressed.
      We use a back arrow to indicate a sub-page flow.
    -->
<header class="bg-surface dark:bg-surface-dim w-full top-0 sticky shadow-sm flex justify-between items-center h-16 px-4 z-40">
<button aria-label="Go back" class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:scale-95 duration-150 ease-in-out p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim font-bold tracking-tight">Report Incident</h1>
<button aria-hidden="true" class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors active:scale-95 duration-150 ease-in-out p-2 rounded-full flex items-center justify-center opacity-0 pointer-events-none">
<!-- Hidden placeholder to maintain center alignment of title -->
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-6 flex flex-col gap-8 max-w-md mx-auto w-full">
<!-- Header Text -->
<div class="flex flex-col gap-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Select Severity</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Choose the option that best describes the current situation to alert others accurately.</p>
</div>
<!-- 
          Severity Selection List 
          Using high visual hierarchy with large touch targets and distinct background colors derived from the theme.
          Since the theme lacks explicit 'Green/Yellow', we map to the closest semantic equivalents available in the config to maintain brand integrity: Neutral/Low (Minor), Warm/Tertiary (Moderate), Error/Red (Severe).
        -->
<div class="flex flex-col gap-4">
<!-- Minor (Base Surface level) -->
<button class="group w-full text-left bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex items-start gap-4 shadow-sm hover:bg-surface-container-low transition-all active:scale-[0.98]">
<div class="bg-surface-container-highest text-on-surface rounded-full p-3 flex-shrink-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]" data-icon="info">info</span>
</div>
<div class="flex flex-col flex-1 pt-1">
<span class="font-headline-md text-headline-md text-on-surface">Minor</span>
<span class="font-body-md text-body-md text-on-surface-variant mt-1">Shoulder only. Minimal impact to main traffic flow.</span>
</div>
<div class="flex items-center justify-center h-full pt-1 text-outline-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Moderate (Warm/Tertiary theme mapping) -->
<button class="group w-full text-left bg-tertiary-fixed border border-tertiary-fixed-dim rounded-xl p-4 flex items-start gap-4 shadow-[0_4px_14px_rgba(188,72,0,0.1)] hover:opacity-90 transition-all active:scale-[0.98]">
<div class="bg-tertiary text-on-tertiary rounded-full p-3 flex-shrink-0 flex items-center justify-center" style="font-variation-settings: 'FILL' 1;">
<span class="material-symbols-outlined text-[24px]" data-icon="warning">warning</span>
</div>
<div class="flex flex-col flex-1 pt-1">
<span class="font-headline-md text-headline-md text-on-tertiary-fixed">Moderate</span>
<span class="font-body-md text-body-md text-on-tertiary-fixed mt-1 opacity-90">One or more lanes blocked. Causing noticeable delays.</span>
</div>
<div class="flex items-center justify-center h-full pt-1 text-tertiary transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Severe (Error theme mapping) -->
<button class="group w-full text-left bg-error-container border border-error/30 rounded-xl p-4 flex items-start gap-4 shadow-[0_4px_14px_rgba(186,26,26,0.15)] hover:opacity-90 transition-all active:scale-[0.98]">
<div class="bg-error text-on-error rounded-full p-3 flex-shrink-0 flex items-center justify-center" style="font-variation-settings: 'FILL' 1;">
<span class="material-symbols-outlined text-[24px]" data-icon="report">report</span>
</div>
<div class="flex flex-col flex-1 pt-1">
<span class="font-headline-md text-headline-md text-on-error-container">Severe</span>
<span class="font-body-md text-body-md text-on-error-container mt-1 opacity-90">All lanes blocked. Multi-vehicle collision or hazardous materials.</span>
</div>
<div class="flex items-center justify-center h-full pt-1 text-error transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
</main>
</body></html>
