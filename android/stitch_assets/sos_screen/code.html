<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-emergency-gradient {
            background: radial-gradient(circle at center, rgba(186, 26, 26, 0.08) 0%, rgba(249, 249, 255, 0) 70%);
        }
        .sos-pulse-ring {
            position: absolute;
            border: 2px solid #ba1a1a;
            border-radius: 9999px;
            inset: -8px;
            opacity: 0.2;
        }
    </style>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-container": "#ffede6",
                        "surface": "#f9f9ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-dim": "#cfdaf2",
                        "tertiary": "#943700",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-container": "#54647a",
                        "on-error": "#ffffff",
                        "secondary-container": "#d0e1fb",
                        "primary-fixed": "#dbe1ff",
                        "tertiary-container": "#bc4800",
                        "on-tertiary-fixed": "#360f00",
                        "on-surface-variant": "#434655",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-container": "#e7eeff",
                        "on-secondary-fixed": "#0b1c30",
                        "on-surface": "#111c2d",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d8e3fb",
                        "surface-container-low": "#f0f3ff",
                        "primary": "#004ac6",
                        "secondary-fixed": "#d3e4fe",
                        "surface-container-highest": "#d8e3fb",
                        "secondary": "#505f76",
                        "on-primary": "#ffffff",
                        "surface-tint": "#0053db",
                        "inverse-surface": "#263143",
                        "secondary-fixed-dim": "#b7c8e1",
                        "tertiary-fixed-dim": "#ffb596",
                        "tertiary-fixed": "#ffdbcd",
                        "outline-variant": "#c3c6d7",
                        "outline": "#737686",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#2563eb",
                        "surface-container-high": "#dee8ff",
                        "on-error-container": "#93000a",
                        "background": "#f9f9ff",
                        "surface-bright": "#f9f9ff",
                        "on-background": "#111c2d",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-primary-container": "#eeefff"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-mobile": "16px",
                        "safe-area-bottom": "34px",
                        "margin-mobile": "16px",
                        "unit": "8px",
                        "columns-mobile": "4"
                    },
                    "fontFamily": {
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {

                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top App Bar - Simplified for high-focus task -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-surface/95 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-all duration-200 active:scale-95 text-on-surface">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-error">Emergency SOS</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow pt-24 pb-safe-area-bottom px-margin-mobile flex flex-col items-center bg-emergency-gradient">
<!-- Status Indicator -->
<div class="flex items-center gap-2 mb-12 px-4 py-2 bg-error-container text-on-error-container rounded-full border border-error/20">
<span class="material-symbols-outlined text-[18px]" data-icon="emergency_home" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
<span class="font-label-lg text-label-lg uppercase tracking-wider font-bold">Emergency Mode Active</span>
</div>
<!-- Central SOS Button Section -->
<div class="relative flex flex-col items-center justify-center mb-16">
<!-- Decorative concentric rings -->
<div class="absolute w-[280px] h-[280px] rounded-full border border-error/10"></div>
<div class="absolute w-[240px] h-[240px] rounded-full border border-error/20"></div>
<button class="relative z-10 w-48 h-48 rounded-full bg-error text-on-error shadow-[0_20px_50px_rgba(186,26,26,0.4)] transition-all duration-300 active:scale-90 flex flex-col items-center justify-center group">
<div class="sos-pulse-ring"></div>
<span class="font-display-lg text-display-lg tracking-tighter mb-[-4px]">SOS</span>
<span class="font-label-sm text-label-sm opacity-90">Press &amp; Hold</span>
</button>
</div>
<!-- Action Grid - Bento Style -->
<div class="grid grid-cols-2 gap-4 w-full max-w-md">
<!-- Primary Emergency Call -->
<button class="col-span-2 flex items-center justify-between p-5 bg-error text-on-error rounded-2xl shadow-lg transition-transform active:scale-[0.98]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="call" style="font-variation-settings: 'FILL' 1;">call</span>
</div>
<div class="text-left">
<span class="block font-headline-md text-headline-md leading-tight">Call 911</span>
<span class="block font-label-sm text-label-sm opacity-80">Local Emergency Services</span>
</div>
</div>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Alert Contacts -->
<button class="flex flex-col items-start p-5 bg-surface-container-high border border-outline-variant/30 rounded-2xl transition-transform active:scale-[0.98]">
<div class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center mb-4">
<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-bold">Alert Contacts</span>
<span class="text-label-sm text-on-surface-variant mt-1 text-left">Notify 3 emergency people</span>
</button>
<!-- Share Location -->
<button class="flex flex-col items-start p-5 bg-surface-container-high border border-outline-variant/30 rounded-2xl transition-transform active:scale-[0.98]">
<div class="w-10 h-10 rounded-lg bg-secondary-container text-on-secondary-container flex items-center justify-center mb-4">
<span class="material-symbols-outlined" data-icon="share_location" style="font-variation-settings: 'FILL' 1;">share_location</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface font-bold">Live Tracking</span>
<span class="text-label-sm text-on-surface-variant mt-1 text-left">Active sharing enabled</span>
</button>
</div>
<!-- Location Context Card -->
<div class="mt-auto w-full max-w-md pb-8">
<div class="bg-surface-container-low rounded-2xl p-4 border border-outline-variant/20 flex items-center gap-4">
<div class="w-16 h-16 rounded-xl overflow-hidden shrink-0 border border-outline-variant/50">
<img class="w-full h-full object-cover" data-alt="A highly detailed satellite map view centered on a modern urban street intersection. The visual style is a clean, technical interface with a soft blue and gray color palette, featuring a prominent glowing red marker indicating a precise location. Lighting is soft and digital, emphasizing clarity and geographic data accuracy in a professional mobile application context." data-location="Los Angeles" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEOLz2f-VXXMmyeiE4EQqeDG15Ril3HfJPnm7sFll5QZTIGX3tPt7cPd1U6Webyb14NtjZMNOUsdEaap6MjplapPpzi-Dg0z9OaQSacvYVdmJdAe0a0myimAbMt-mDAdwnvkFVVuPFN_OmTIMf2QNtcEMdgUHiubkJr_LbtAW2eSwQnW41TEQxqehdpBaAuNFC1PRKE4QXjIVYr5DVYTQIotXfs93-Clr4XKBJKTMpNARv7nGkXbCNzZxMce3vRhDVefP4u6rf7w"/>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between mb-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">Current Location</span>
<span class="text-[10px] font-bold text-error uppercase">Live</span>
</div>
<p class="font-body-md text-body-md text-on-surface font-semibold mb-1">1244 Melrose Avenue, CA</p>
<div class="flex gap-4">
<span class="text-label-sm text-outline font-mono">34.0837Â° N</span>
<span class="text-label-sm text-outline font-mono">118.3308Â° W</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
</main>
<!-- Contextual Information Bar -->
<footer class="p-4 bg-surface-container-highest/30 backdrop-blur-sm border-t border-outline-variant/10">
<div class="max-w-md mx-auto flex items-center justify-center gap-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="battery_full">battery_full</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">88%</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="network_check">network_check</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">LTE Stable</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="medical_services">medical_services</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">MedID Ready</span>
</div>
</div>
</footer>
</body></html>
