<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Traffic Guard - Night Navigation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#360f00",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "surface-tint": "#0053db",
                      "secondary": "#505f76",
                      "primary-fixed-dim": "#b4c5ff",
                      "surface-container-highest": "#d8e3fb",
                      "error-container": "#ffdad6",
                      "primary-fixed": "#dbe1ff",
                      "on-secondary-fixed": "#0b1c30",
                      "on-tertiary-fixed-variant": "#7d2d00",
                      "on-secondary": "#ffffff",
                      "tertiary": "#943700",
                      "inverse-surface": "#263143",
                      "error": "#ba1a1a",
                      "outline": "#737686",
                      "on-primary-fixed-variant": "#003ea8",
                      "surface-container-high": "#dee8ff",
                      "on-primary-container": "#eeefff",
                      "tertiary-fixed-dim": "#ffb596",
                      "secondary-container": "#d0e1fb",
                      "on-surface": "#111c2d",
                      "on-secondary-fixed-variant": "#38485d",
                      "background": "#f9f9ff",
                      "surface": "#f9f9ff",
                      "outline-variant": "#c3c6d7",
                      "on-secondary-container": "#54647a",
                      "on-surface-variant": "#434655",
                      "tertiary-container": "#bc4800",
                      "on-error-container": "#93000a",
                      "on-background": "#111c2d",
                      "on-primary-fixed": "#00174b",
                      "surface-variant": "#d8e3fb",
                      "surface-container": "#e7eeff",
                      "inverse-primary": "#b4c5ff",
                      "surface-dim": "#cfdaf2",
                      "tertiary-fixed": "#ffdbcd",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#f0f3ff",
                      "secondary-fixed": "#d3e4fe",
                      "on-tertiary-container": "#ffede6",
                      "on-tertiary": "#ffffff",
                      "primary-container": "#2563eb",
                      "inverse-on-surface": "#ecf1ff",
                      "primary": "#004ac6",
                      "secondary-fixed-dim": "#b7c8e1",
                      "surface-bright": "#f9f9ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "safe-area-bottom": "34px",
                      "gutter-mobile": "16px",
                      "margin-mobile": "16px",
                      "columns-mobile": "4",
                      "unit": "8px"
              },
              "fontFamily": {
                      "display-lg": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg-mobile": [
                              "Hanken Grotesk"
                      ],
                      "label-sm": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "label-lg": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg": [
                              "Hanken Grotesk"
                      ]
              },
              "fontSize": {
                      "display-lg": [
                              "48px",
                              {
                                      "lineHeight": "56px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-lg-mobile": [
                              "28px",
                              {
                                      "lineHeight": "36px",
                                      "fontWeight": "600"
                              }
                      ],
                      "label-sm": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.02em",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-md": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "label-lg": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "letterSpacing": "0.01em",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-lg": [
                              "18px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "600"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Map Styles for Dark Mode */
        .map-bg {
            background-color: #1a1e23; /* Dark slate */
            background-image: 
                radial-gradient(circle at 50% 50%, #2a3038 0%, transparent 80%),
                linear-gradient(0deg, rgba(26,30,35,1) 0%, rgba(30,35,42,1) 100%);
        }
        .route-line {
            background: linear-gradient(90deg, #0053db, #3b82f6);
            box-shadow: 0 0 15px rgba(0, 83, 219, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-surface text-on-primary h-screen w-screen overflow-hidden flex flex-col font-body-md select-none">
<!-- Top Turn Instruction Card -->
<header class="fixed top-0 w-full z-50 p-4 pt-safe-area-top">
<div class="bg-[#0f5132] text-white rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.5)] p-4 flex items-center justify-between border border-[#198754]/30 backdrop-blur-md">
<div class="flex items-center space-x-4">
<div class="bg-[#198754] p-3 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">turn_right</span>
</div>
<div>
<p class="font-display-lg text-display-lg tracking-tight">0.8 <span class="text-2xl">mi</span></p>
<p class="font-headline-md text-headline-md text-white/90">W 4th St</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="bg-black/20 px-3 py-1 rounded-full font-label-lg text-label-lg uppercase tracking-wider text-white/80 border border-white/10">Next</span>
<span class="mt-1 font-body-md text-body-md text-white/90 flex items-center">
<span class="material-symbols-outlined text-sm mr-1">straight</span>
                    I-35 N
                </span>
</div>
</div>
</header>
<!-- Map Canvas Area -->
<main class="flex-1 relative map-bg z-0 w-full h-full">
<!-- Abstract Dark Map Representation -->
<div class="absolute inset-0 overflow-hidden opacity-50">
<!-- Grid lines -->
<div class="absolute inset-0" style="background-image: linear-gradient(to right, #38485d 1px, transparent 1px), linear-gradient(to bottom, #38485d 1px, transparent 1px); background-size: 80px 80px; opacity: 0.2;"></div>
<!-- Main Highway -->
<div class="absolute top-[20%] left-[-10%] w-[120%] h-12 bg-[#263143] transform rotate-[-15deg] flex items-center justify-center">
<div class="w-full border-t-2 border-dashed border-[#505f76]"></div>
</div>
<!-- Secondary Road -->
<div class="absolute top-[60%] left-[-10%] w-[120%] h-8 bg-[#263143] transform rotate-[25deg]"></div>
<!-- Water Body -->
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[40%] bg-[#0b1c30] rounded-tl-[100px] blur-sm"></div>
</div>
<!-- The Route -->
<div class="absolute top-[40%] left-[20%] w-[50%] h-[40%] border-l-8 border-b-8 border-primary-fixed-dim/20 rounded-bl-[40px]">
<!-- Glowing active segment -->
<div class="absolute bottom-0 left-0 w-full h-2 route-line rounded-r-full"></div>
<div class="absolute top-0 left-[-4px] w-2 h-full route-line rounded-t-full"></div>
</div>
<!-- Vehicle Indicator -->
<div class="absolute top-[40%] left-[20%] transform -translate-x-1/2 -translate-y-1/2 z-20">
<div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center animate-pulse">
<div class="w-12 h-12 bg-primary/40 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">navigation</span>
</div>
</div>
</div>
<!-- Destination Pin -->
<div class="absolute top-[80%] left-[70%] transform -translate-x-1/2 -translate-y-full z-10">
<span class="material-symbols-outlined text-error text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<!-- Floating Actions Right -->
<div class="absolute right-4 top-32 flex flex-col space-y-4 z-30">
<button class="w-12 h-12 bg-inverse-surface text-on-primary rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.3)] flex items-center justify-center border border-outline-variant/20 hover:bg-surface-variant hover:text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">compass_calibration</span>
</button>
<button class="w-12 h-12 bg-inverse-surface text-on-primary rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.3)] flex items-center justify-center border border-outline-variant/20 hover:bg-surface-variant hover:text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">volume_up</span>
</button>
<div class="bg-inverse-surface rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.3)] border border-outline-variant/20 overflow-hidden flex flex-col">
<button class="w-12 h-12 text-on-primary flex items-center justify-center hover:bg-surface-variant hover:text-on-surface-variant transition-colors border-b border-outline-variant/20">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-12 h-12 text-on-primary flex items-center justify-center hover:bg-surface-variant hover:text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- Speed Limit & Current Speed -->
<div class="absolute left-4 bottom-32 flex flex-col items-center space-y-2 z-30">
<!-- Speed Limit Sign -->
<div class="w-14 h-16 bg-white rounded flex flex-col items-center justify-center border-2 border-black shadow-lg">
<span class="font-label-sm text-label-sm text-black uppercase leading-tight mt-1">Speed</span>
<span class="font-label-sm text-label-sm text-black uppercase leading-tight mb-1">Limit</span>
<span class="font-headline-md text-headline-md text-black font-bold">65</span>
</div>
<!-- Current Speed -->
<div class="w-16 h-16 bg-inverse-surface rounded-full flex flex-col items-center justify-center border border-outline-variant/20 shadow-[0_4px_12px_rgba(0,0,0,0.3)]">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-white">62</span>
<span class="font-label-sm text-label-sm text-outline">mph</span>
</div>
</div>
</main>
<!-- Bottom Trip Info Card -->
<footer class="fixed bottom-0 w-full z-50 bg-inverse-surface text-on-primary rounded-t-2xl shadow-[0_-10px_25px_rgba(0,0,0,0.5)] border-t border-outline-variant/10 pb-safe-area-bottom">
<div class="p-4 flex items-center justify-between">
<div class="flex flex-col">
<div class="flex items-end space-x-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary-fixed-dim">14 min</span>
<span class="font-body-md text-body-md text-outline mb-1">8.2 mi</span>
</div>
<div class="flex items-center space-x-2 mt-1">
<span class="font-body-lg text-body-lg">8:42 PM</span>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<span class="font-body-md text-body-md text-outline">Arrival</span>
</div>
</div>
<div class="flex space-x-3">
<button class="w-12 h-12 bg-secondary text-white rounded-full flex items-center justify-center hover:bg-secondary/80 transition-colors">
<span class="material-symbols-outlined">search</span>
</button>
<button class="w-12 h-12 bg-error text-white rounded-full flex items-center justify-center hover:bg-error/80 transition-colors shadow-[0_4px_12px_rgba(186,26,26,0.3)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-highest/20">
<div class="h-full bg-primary-fixed-dim w-3/4 rounded-r-full"></div>
</div>
</footer>
</body></html>
