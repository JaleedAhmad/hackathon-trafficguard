<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Analysis Loading - App Shell</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Hanken+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#263143",
                        "surface-container": "#e7eeff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-secondary-fixed-variant": "#38485d",
                        "tertiary-fixed": "#ffdbcd",
                        "tertiary": "#943700",
                        "outline": "#737686",
                        "on-background": "#111c2d",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#434655",
                        "on-surface": "#111c2d",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-tertiary-container": "#ffede6",
                        "surface-bright": "#f9f9ff",
                        "secondary": "#505f76",
                        "inverse-on-surface": "#ecf1ff",
                        "on-primary-container": "#eeefff",
                        "error": "#ba1a1a",
                        "surface-dim": "#cfdaf2",
                        "on-tertiary-fixed": "#360f00",
                        "background": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "secondary-container": "#d0e1fb",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "primary": "#004ac6",
                        "on-secondary-container": "#54647a",
                        "surface-container-high": "#dee8ff",
                        "primary-container": "#2563eb",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#d3e4fe",
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#d8e3fb",
                        "on-error": "#ffffff",
                        "tertiary-container": "#bc4800",
                        "inverse-primary": "#b4c5ff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-tint": "#0053db",
                        "on-primary-fixed": "#00174b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px",
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .pulse-soft {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        
        .progress-bar-fill {
            animation: progress 4s ease-in-out infinite;
            width: 0%;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 75%; }
            100% { width: 100%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased">
<!-- Suppressed TopAppBar and BottomNavBar as this is a linear/transactional loading screen -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile w-full max-w-md mx-auto">
<!-- Main Graphic Area -->
<div class="relative w-48 h-48 mb-12 flex items-center justify-center">
<!-- Outer Pulsing Ring -->
<div class="absolute inset-0 rounded-full bg-primary-container opacity-20 pulse-soft"></div>
<div class="absolute inset-4 rounded-full bg-primary-fixed-dim opacity-30 pulse-soft" style="animation-delay: 0.5s;"></div>
<!-- Central Icon -->
<div class="z-10 bg-surface-container-lowest rounded-full p-6 shadow-xl border border-surface-container-high flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl spin-slow" data-icon="settings" style="font-variation-settings: 'FILL' 1;">
                    settings
                </span>
</div>
<!-- Floating Data Nodes (Decorative) -->
<div class="absolute top-0 right-4 bg-secondary-container text-on-secondary-container rounded-full p-2 shadow-sm pulse-soft" style="animation-delay: 0.2s;">
<span class="material-symbols-outlined text-sm" data-icon="image">image</span>
</div>
<div class="absolute bottom-4 left-0 bg-tertiary-container text-on-tertiary-container rounded-full p-2 shadow-sm pulse-soft" style="animation-delay: 0.8s;">
<span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
</div>
<div class="absolute bottom-8 right-0 bg-primary text-on-primary rounded-full p-2 shadow-sm pulse-soft" style="animation-delay: 1.2s;">
<span class="material-symbols-outlined text-sm" data-icon="analytics">analytics</span>
</div>
</div>
<!-- Typography & Status -->
<div class="text-center w-full mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">
                Analyzing Report
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant h-6 pulse-soft">
                Verifying location data...
            </p>
</div>
<!-- Progress Indicator -->
<div class="w-full bg-surface-container-high rounded-full h-2 mb-8 overflow-hidden">
<div class="bg-primary h-2 rounded-full progress-bar-fill"></div>
</div>
<!-- Status Checklist (Bento-style items) -->
<div class="w-full grid grid-cols-1 gap-3">
<!-- Completed Task -->
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-4 flex items-center shadow-sm">
<div class="bg-primary-container text-on-primary-container rounded-full p-1 mr-4 flex-shrink-0">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex-grow">
<p class="font-label-lg text-label-lg text-on-surface">Uploading images</p>
</div>
</div>
<!-- Current Task -->
<div class="bg-surface-container border border-primary-fixed-dim rounded-xl p-4 flex items-center shadow-sm relative overflow-hidden">
<!-- Subtle highlight sweep for current task -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white to-transparent opacity-30 w-full h-full" style="animation: progress 2s linear infinite;"></div>
<div class="bg-surface-container-lowest text-primary rounded-full p-1 mr-4 flex-shrink-0 spin-slow">
<span class="material-symbols-outlined text-sm" data-icon="sync">sync</span>
</div>
<div class="flex-grow z-10">
<p class="font-label-lg text-label-lg text-on-surface font-semibold">Analyzing photos...</p>
</div>
</div>
<!-- Pending Task -->
<div class="bg-surface-bright border border-surface-variant rounded-xl p-4 flex items-center opacity-60">
<div class="bg-surface-variant text-outline rounded-full p-1 mr-4 flex-shrink-0">
<span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
</div>
<div class="flex-grow">
<p class="font-label-lg text-label-lg text-on-surface-variant">Generating insights</p>
</div>
</div>
</div>
</main>
</body></html>
