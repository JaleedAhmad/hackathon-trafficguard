                        "on-tertiary-container": "#ffede6",

                        "inverse-on-surface": "#ecf1ff",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-bright": "#f9f9ff"

                    },
                    "spacing": {
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px",
                        "margin-mobile": "16px",

                        "unit": "8px",
                        "14": "3.5rem",
                        "18": "4.5rem"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],

                }
            }
        }

<style>
        /* Hide scrollbar for clean horizontal scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body-md antialiased h-screen w-screen overflow-hidden relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Map Canvas (Background Layer) -->
<div class="absolute inset-0 z-0 bg-surface-variant">
<img alt="Map overview showing route" class="w-full h-full object-cover opacity-90" data-alt="A clean, modern top-down 2D map interface filling the screen. The map uses a light-mode color palette with soft gray roads, subtle green parks, and light blue water bodies, characteristic of a premium navigation app. A distinct, glowing primary blue route line traces a path through the city streets. At the end of the route, a sharp, contrasting red destination pin stands out against the minimal background. The overall aesthetic is highly functional, corporate, and distraction-free." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBdpmR2me0n_YsX4sWY6yU49QfDz1lVS-e5eWagV2YkAcV4OkPcDtO-2uZ3lDnCM9eya8_vquwLHDO3qVZAFPYJMi5JRClXyd2DPSLf2tc9s3avg-ZKb0o4s5fL37SXUgbLV28f-HHHOUoQaJyRln6dY-j7XVyMKyacWgnBZI1fkJZiWqLruVm5rmZANuG8oAqRUrBsam3N5MCvjNVY7vMlaqlGPlr6QQ5IMrSwQALIKBtXzwtaowd8A4otfYES5FPsOPRRlsLuQ"/>
</div>
<!-- Floating Top Contextual Actions -->
<div class="absolute top-0 w-full z-40 px-margin-mobile pt-12 flex justify-between items-start pointer-events-none">
<!-- Back Button (Interactive) -->
<button class="w-12 h-12 bg-surface/90 backdrop-blur-md rounded-full shadow-sm flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors pointer-events-auto border border-outline-variant/20">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- Contextual Actions (Interactive) -->
<div class="flex flex-col gap-3 pointer-events-auto">
<button class="w-12 h-12 bg-surface/90 backdrop-blur-md rounded-full shadow-sm flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors border border-outline-variant/20">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 bg-surface/90 backdrop-blur-md rounded-full shadow-sm flex items-center justify-center text-on-surface hover:bg-surface-container transition-colors border border-outline-variant/20">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
</div>
<!-- Bottom Sheet Component (Level 2 Elevation) -->
<!-- Structurally decoupled from global nav, serving as a contextual task pane -->
<div class="absolute bottom-0 left-0 w-full bg-surface rounded-t-3xl shadow-[0px_-8px_32px_rgba(0,0,0,0.12)] z-50 flex flex-col pt-2 pb-[env(safe-area-inset-bottom,34px)] transition-transform duration-300 ease-out">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mx-auto mb-6"></div>
<div class="px-margin-mobile flex flex-col gap-6">
<!-- Primary Route Headline -->
<div class="flex justify-between items-end">
<div class="flex flex-col">
<span class="font-display-lg text-display-lg text-primary tracking-tight">24<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary ml-1">min</span></span>
<span class="font-label-lg text-label-lg text-secondary mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="bolt">bolt</span>
                        Fastest route
                    </span>
</div>
<div class="text-right flex flex-col items-end">
<span class="font-headline-md text-headline-md text-on-surface">12 mi</span>
<span class="font-body-md text-body-md text-on-surface-variant mt-1">Arrival 3:45 PM</span>
</div>
</div>
<!-- Route Alternatives (Bento-style scrollable area) -->
<div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar -mx-margin-mobile px-margin-mobile">
<!-- Active Route Card -->
<div class="min-w-[140px] flex-shrink-0 bg-primary-container/20 border-2 border-primary rounded-2xl p-3 flex flex-col gap-1 cursor-pointer">
<span class="font-label-lg text-label-lg text-on-primary-fixed-variant">Via I-95 N</span>
<div class="flex items-center gap-2 mt-auto pt-2">
<span class="font-body-md text-body-md text-primary font-medium">24 min</span>
<span class="w-1 h-1 bg-primary rounded-full"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Fast</span>
</div>
</div>
<!-- Alternative Route Card -->
<div class="min-w-[140px] flex-shrink-0 bg-surface-container-low border border-outline-variant/50 rounded-2xl p-3 flex flex-col gap-1 cursor-pointer hover:bg-surface-container transition-colors">
<span class="font-label-lg text-label-lg text-on-surface">Via Hwy 1</span>
<div class="flex items-center gap-2 mt-auto pt-2">
<span class="font-body-md text-body-md text-on-surface-variant">32 min</span>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Scenic</span>
</div>
</div>
<!-- Alternative Route Card -->
<div class="min-w-[140px] flex-shrink-0 bg-surface-container-low border border-outline-variant/50 rounded-2xl p-3 flex flex-col gap-1 cursor-pointer hover:bg-surface-container transition-colors">
<span class="font-label-lg text-label-lg text-on-surface">Via Backroads</span>
<div class="flex items-center gap-2 mt-auto pt-2">
<span class="font-body-md text-body-md text-on-surface-variant">38 min</span>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant">-2 mi</span>
</div>
</div>
</div>
<!-- Action Area -->
<div class="flex gap-4 items-center pt-2">
<!-- Start Button (Primary Call to Action) -->
<button class="flex-1 h-14 bg-primary text-on-primary rounded-full flex items-center justify-center gap-2 font-label-lg text-label-lg shadow-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="navigation" data-weight="fill" style="font-variation-settings: 'FILL' 1;">navigation</span>
                    Start
                </button>
<!-- Secondary Action (Steps/List view) -->
<button class="w-14 h-14 bg-surface-container flex-shrink-0 text-on-surface rounded-full flex items-center justify-center hover:bg-surface-container-high active:scale-[0.98] transition-all border border-outline-variant/20">
<span class="material-symbols-outlined" data-icon="list">list</span>
</button>
</div>
</div>
</div>
<!-- Note: TopAppBar and BottomNavBar are intentionally suppressed per the Semantic Shell Mandate for Task-Focused screens (Navigation Idle State). -->
</body></html>
