<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Traffic Guard - Rerouting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#360f00",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-tint": "#0053db",
                        "secondary": "#505f76",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-highest": "#d8e3fb",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed": "#0b1c30",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#943700",
                        "inverse-surface": "#263143",
                        "error": "#ba1a1a",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#dee8ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-container": "#d0e1fb",
                        "on-surface": "#111c2d",
                        "on-secondary-fixed-variant": "#38485d",
                        "background": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-container": "#54647a",
                        "on-surface-variant": "#434655",
                        "tertiary-container": "#bc4800",
                        "on-error-container": "#93000a",
                        "on-background": "#111c2d",
                        "on-primary-fixed": "#00174b",
                        "surface-variant": "#d8e3fb",
                        "surface-container": "#e7eeff",
                        "inverse-primary": "#b4c5ff",
                        "surface-dim": "#cfdaf2",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "secondary-fixed": "#d3e4fe",
                        "on-tertiary-container": "#ffede6",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#ecf1ff",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-bright": "#f9f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px",
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .map-bg {
            background-color: #e5e5e5;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-full overflow-hidden flex flex-col relative font-body-md">
<!-- TopAppBar - Rerouting State -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-4 h-16 bg-surface-container-high/95 backdrop-blur-md shadow-sm transition-all duration-200">
<button aria-label="Menu" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 text-on-surface-variant transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<div class="flex flex-col items-center justify-center flex-1">
<div class="flex items-center gap-2 text-error">
<span class="material-symbols-outlined text-[20px] pulse-ring">route</span>
<h1 class="font-headline-md text-headline-md font-bold">Recalculating...</h1>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-0.5">Finding a faster route</p>
</div>
<button aria-label="Settings" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 text-on-surface-variant transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
</header>
<!-- Map Canvas Area -->
<main class="flex-1 w-full h-full relative map-bg pt-16 pb-safe-area-bottom">
<!-- Mock Map Content -->
<div class="absolute inset-0 z-0 flex items-center justify-center">
<!-- Previous Route (Dimmed) -->
<svg class="absolute w-full h-full pointer-events-none opacity-30" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="text-outline" d="M 20 80 Q 40 50 80 20" fill="none" stroke="currentColor" stroke-dasharray="4 4" stroke-width="2"></path>
</svg>
<!-- New Calculating Route (Highlighted) -->
<svg class="absolute w-full h-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="text-primary pulse-ring" d="M 20 80 C 20 60 60 70 80 20" fill="none" stroke="currentColor" stroke-width="4"></path>
</svg>
<!-- Current Position Marker -->
<div class="absolute left-[20%] top-[80%] -translate-x-1/2 -translate-y-1/2 z-10 flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center pulse-ring">
<div class="w-4 h-4 rounded-full bg-primary border-2 border-white shadow-sm"></div>
</div>
</div>
<!-- Destination Marker -->
<div class="absolute left-[80%] top-[20%] -translate-x-1/2 -translate-y-1/2 z-10">
<span class="material-symbols-outlined text-[32px] text-error drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Rerouting Status Card (Bottom Overlay) -->
<div class="absolute bottom-6 left-4 right-4 z-40">
<div class="bg-surface-container-high rounded-xl shadow-lg p-4 flex flex-col gap-3 border border-outline-variant/30">
<div class="flex items-start justify-between">
<div class="flex gap-3">
<div class="w-12 h-12 rounded-full bg-error-container text-on-error-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-[28px]">alt_route</span>
</div>
<div class="flex flex-col">
<h2 class="font-body-lg text-body-lg font-semibold text-on-surface">Traffic Ahead</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Exploring alternative via I-95 N</p>
</div>
</div>
<div class="text-right">
<p class="font-body-lg text-body-lg font-bold text-error">+12 min</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">delay</p>
</div>
</div>
<!-- Progress Bar -->
<div class="w-full h-1.5 bg-surface-variant rounded-full overflow-hidden mt-1">
<div class="h-full bg-primary w-2/3 pulse-ring rounded-full"></div>
</div>
<div class="flex justify-between items-center mt-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">Analyzing live data...</span>
<button class="font-label-lg text-label-lg text-primary font-medium hover:text-primary-fixed-variant px-2 py-1 rounded-md transition-colors">
                        Cancel
                    </button>
</div>
</div>
</div>
<!-- Floating Action Buttons -->
<div class="absolute right-4 top-20 z-40 flex flex-col gap-3">
<button aria-label="Compass" class="w-12 h-12 bg-surface rounded-full shadow-md flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[24px]">explore</span>
</button>
<button aria-label="Sound Settings" class="w-12 h-12 bg-surface rounded-full shadow-md flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[24px]">volume_up</span>
</button>
</div>
</main>
<!-- BottomNavBar is suppressed as this is a focused navigation/task flow -->
</body></html>
