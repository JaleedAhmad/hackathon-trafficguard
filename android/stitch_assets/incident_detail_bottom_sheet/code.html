<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Traffic Guard - Incident Detail</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#360f00",
                        "on-primary": "#ffffff",

                        "surface-tint": "#0053db",
                        "secondary": "#505f76",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-highest": "#d8e3fb",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed": "#0b1c30",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#943700",
                        "inverse-surface": "#263143",
                        "error": "#ba1a1a",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#dee8ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-container": "#d0e1fb",
                        "on-surface": "#111c2d",
                        "on-secondary-fixed-variant": "#38485d",
                        "background": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-container": "#54647a",
                        "on-surface-variant": "#434655",
                        "tertiary-container": "#bc4800",
                        "on-error-container": "#93000a",
                        "on-background": "#111c2d",
                        "on-primary-fixed": "#00174b",
                        "surface-variant": "#d8e3fb",
                        "surface-container": "#e7eeff",
                        "inverse-primary": "#b4c5ff",
                        "surface-dim": "#cfdaf2",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f3ff",
                        "secondary-fixed": "#d3e4fe",
                        "on-tertiary-container": "#ffede6",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#2563eb",
                        "inverse-on-surface": "#ecf1ff",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface-bright": "#f9f9ff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px",
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px"
                    },
                    fontFamily: {
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"]
                    },
                    fontSize: {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],

<style>.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDH-VkSJIw6ROrFNh9wJm4J88KBPk3HZGoicli-_NPxZ1der89PDFmfZXVzwPB9dMzyMVNiZJvNnI5oRNCftBbxrNc-axmD2YWgSW1XLqgSUSwVcmOvBPTidfSONHIQXz8l8nYgGkTzWIdBq2Zl0QfFq7KbMZi583cySoknxRi1Q77aCKE2LRoi981waLFAOGtCpg_AlhRBLt6bVWbyK4Fb70HxNWkn3Z7CrtFSlX6VVKd66VmjKTHrxp7bNeXZ2r4o1sjh9qHFVw);
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden relative selection:bg-primary/20">
<!-- Top App Bar (Suppressing as per 'Incident Detail' intent - Focus is on the bottom sheet/modal context) -->
<!-- Navigation Drawer (Suppressed) -->
<!-- Background Map Context -->
<div class="absolute inset-0 z-0 map-bg" data-alt="A highly detailed top-down view of a modern city map interface, shown in a clean, light-mode style. The map displays intricate road networks with subtle shading to indicate elevation and traffic flow. The overall color palette is composed of soft blues, crisp whites, and gentle grays, aligning with a professional, utilitarian aesthetic. The scene is bright and evenly lit, conveying a sense of accuracy and reliable navigation." data-location="City Map View" style="">
<!-- Floating Back Button (Contextual override for TopAppBar in a focused detail view) -->
<button class="absolute top-12 left-4 z-20 w-12 h-12 bg-surface/90 backdrop-blur-md rounded-full flex items-center justify-center shadow-sm text-on-surface hover:bg-surface-variant/50 transition-all duration-200 active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<!-- Center Marker on Map to indicate the pothole -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
<div class="bg-tertiary text-on-tertiary w-14 h-14 rounded-full flex items-center justify-center shadow-lg mb-2 relative">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">warning</span>
<!-- Pulse effect -->
<div class="absolute inset-0 rounded-full border-4 border-tertiary opacity-30 animate-ping"></div>
</div>
<!-- Marker pointer tail -->
<div class="w-0 h-0 border-l-8 border-r-8 border-t-8 border-l-transparent border-r-transparent border-t-tertiary -mt-3 shadow-sm"></div>
</div>
</div>
<!-- Bottom Sheet Container (Level 2 Elevation) -->
<div class="absolute bottom-0 left-0 w-full z-[60] bg-surface rounded-t-3xl shadow-[0_-10px_25px_rgba(0,0,0,0.1)] flex flex-col pb-safe-area-bottom transition-transform duration-300 ease-out transform translate-y-0">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-12 h-1 bg-outline-variant/50 rounded-full"></div>
</div>
<!-- Content Canvas -->
<div class="px-6 pt-4 pb-8 flex flex-col gap-6">
<!-- Header section -->
<div class="flex items-start justify-between">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="inline-flex items-center justify-center bg-error-container text-on-error-container rounded-md px-2 py-0.5 text-xs font-semibold uppercase tracking-wider">Hazard</span>
<span class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span>
                            15 mins ago
                        </span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Incident: Pothole</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">group</span>
                        Reported by 4 drivers
                    </p>
</div>
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant flex-shrink-0">
<span class="material-symbols-outlined text-[24px]">share</span>
</div>
</div>
<!-- Contextual Card -->
<div class="bg-surface-container-low rounded-2xl p-4 border border-outline-variant/30 flex items-start gap-4">
<div class="bg-surface text-primary w-10 h-10 rounded-full flex items-center justify-center shadow-sm flex-shrink-0">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-surface font-semibold">Westbound I-90, Mile 42</p>
<p class="font-body-sm text-on-surface-variant mt-0.5">Right lane. Proceed with caution.</p>
</div>
</div>
<!-- Call to Action Section -->
<div class="flex flex-col gap-4 mt-2">
<h3 class="font-headline-md text-headline-md text-on-surface text-center">Is this hazard still there?</h3>
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center gap-2 py-4 rounded-xl border-2 border-outline-variant text-on-surface font-label-lg text-label-lg hover:bg-surface-variant/50 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
                        No, it's clear
                    </button>
<button class="flex items-center justify-center gap-2 py-4 rounded-xl bg-primary text-on-primary font-label-lg text-label-lg shadow-sm hover:bg-primary-fixed-variant transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
                        Yes, still there
                    </button>
</div>
</div>
</div>
</div>
</body></html>
