</button>

<!-- Main Content Canvas -->

<!-- Header Section -->
<section class="px-margin-mobile pt-6 pb-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Upload Media</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Document the incident thoroughly. Providing multiple angles helps us review your case faster.</p>
</section>
<!-- Tips Card -->
<section class="px-margin-mobile mb-6">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex gap-4 shadow-sm relative overflow-hidden">
<!-- Decorative left border for alert style -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<div class="flex-shrink-0 pt-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div class="flex-1">
<h2 class="font-label-lg text-label-lg text-on-surface mb-1">Photo Guidelines</h2>
<ul class="font-body-md text-body-md text-on-surface-variant list-disc pl-4 space-y-1">
<li>Ensure the area is well-lit.</li>
<li>Take close-ups of specific details.</li>
<li>Include a wide shot of the surrounding area.</li>
</ul>
</div>
</div>
</section>
<!-- Action Buttons (Bento Layout) -->
<section class="px-margin-mobile mb-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Primary Action: Take Photo -->
<button class="bg-primary text-on-primary rounded-xl p-8 flex flex-col items-center justify-center gap-4 shadow-[0px_4px_10px_rgba(0,74,198,0.2)] hover:bg-primary/95 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-headline-md text-headline-md">Take Photo</span>
</button>
<!-- Secondary Action: Upload from Gallery -->
<button class="bg-surface-container hover:bg-surface-container-high border-2 border-transparent hover:border-primary/10 text-on-surface rounded-xl p-6 flex flex-col items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[32px] text-primary">photo_library</span>
<span class="font-label-lg text-label-lg">Upload from Gallery</span>
</button>
</div>
</section>
<!-- Preview Rail -->
<section class="px-margin-mobile mb-6 flex-1 flex flex-col">
<div class="flex items-center justify-between mb-4">
<h3 class="font-headline-md text-headline-md text-on-surface">Captured Media</h3>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-full">3 Items</span>
</div>
<div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide snap-x">

<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<!-- Preview Item 2 -->
<div class="snap-start shrink-0 relative w-32 h-32 rounded-xl overflow-hidden border border-outline-variant shadow-sm group">
<div class="absolute inset-0 bg-surface-variant bg-cover bg-center" data-alt="A photograph taken from a medium distance showing a broken taillight on a vehicle, with shattered red plastic fragments scattered on the asphalt below. The lighting is slightly overcast, creating soft, even shadows that emphasize the sharp edges of the broken pieces. Embedded in a minimal, high-utility user interface with a crisp light-mode aesthetic, the image acts as essential evidence. The overall tone is practical and serious, aligning with a structured incident documentation workflow." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDPHRINn2yk9exlLm1mCnm74LV7y1Tgpo0ntppXEkUdWpo_NTrBZYPaWd3lFyid1Vr0c5XhRKxb4L_I0ic5gpComqWsHHjoxdkK9OfAsQsmvUH4O3pYUvc9Es01zPgvRDKUIAexF0IYd9H2h5F7piJPRBrlxBG3vdTAT-fLELfJBCrUP8VHnILEsJmM6QiGT0yFp-ANAuPP54x8nqc2JHdx9G-HgYetyKE5_3Ss1c6KyUG5KRivPFc5n7-qnbN-qi46AHbhaOumrg');"></div>
<button class="absolute top-2 right-2 bg-inverse-surface/80 text-inverse-on-surface rounded-full p-1 shadow-sm opacity-90 hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<!-- Preview Item 3 -->
<div class="snap-start shrink-0 relative w-32 h-32 rounded-xl overflow-hidden border border-outline-variant shadow-sm group">
<div class="absolute inset-0 bg-surface-variant bg-cover bg-center" data-alt="A wide-angle shot capturing the overall scene of a minor fender bender in an empty parking lot on a clear day. Two cars are positioned closely together, and the environment is neatly structured with clear white parking lines on dark gray tarmac. This contextual placeholder image sits within a sophisticated mobile application design utilizing a pristine 'surface' color palette with subtle drop shadows. The image quality is sharp and high-resolution, intended to provide complete situational awareness." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDrkbbej2_2ym16JLsX9KpOvofG25jnc8I33ZitsOQLjBdF2kgtD-Oi6YW5JTK7SVT-1PcClA2_AJ1aqET7j4TmuVT1t88Ri_WtN1ParwaHSyJ0_i520iOJxIHZ4L5zjxBoq7JwDzHtU7OGGA8m4z4iWdjaeqYJbqnpu0f82z32G77UteoJhIWC2E_eiy8oTV0I4T1_R1eQie30AbvRhuIAth78qYSrUGui5zG9Hv6t3VLDhQNqrfYhNLT_zlNijLyv_Q-GacW2lw');"></div>

<section class="px-margin-mobile mt-auto pt-4 pb-4">
