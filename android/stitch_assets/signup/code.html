<!DOCTYPE html>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center p-4">
<!-- Suppressed TopAppBar and BottomNavBar as this is a transactional linear flow (Sign-up) -->
<main class="w-full max-w-md w-full bg-surface rounded-xl shadow-sm border border-outline-variant/30 overflow-hidden">
<!-- Header Section -->
<div class="px-6 pt-8 pb-6 text-center">
<h1 class="font-headline-md text-headline-md text-primary mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join App Shell today and start exploring.</p>
</div>
<!-- Form Section -->
<div class="px-6 pb-8">
<form class="space-y-4">
<!-- Full Name Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 20px;">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline rounded-lg bg-surface-bright text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 20px;">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline rounded-lg bg-surface-bright text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 20px;">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline rounded-lg bg-surface-bright text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="password" name="password" placeholder="芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-1" for="confirmPassword">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 20px;">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline rounded-lg bg-surface-bright text-on-surface font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow" id="confirmPassword" name="confirmPassword" placeholder="芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄芒聙垄" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="focus:ring-primary h-4 w-4 text-primary border-outline rounded bg-surface-bright" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">I agree to the <a class="text-primary hover:underline font-label-lg text-label-lg" href="#">Terms and Conditions</a></label>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm font-label-lg text-label-lg text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors active:scale-[0.98]" type="submit">
                        Create Account
                    </button>
</div>
</form>
<!-- Divider -->
<div class="mt-6 mb-6 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-2 bg-surface font-body-md text-body-md text-on-surface-variant">Or sign up with</span>
</div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center w-full px-4 py-2 border border-outline rounded-lg shadow-sm bg-surface-bright font-label-lg text-label-lg text-on-surface hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined mr-2" style="font-size: 20px;">g_mobiledata</span>
                    Google
                </button>
<button class="flex items-center justify-center w-full px-4 py-2 border border-outline rounded-lg shadow-sm bg-surface-bright font-label-lg text-label-lg text-on-surface hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined mr-2" style="font-size: 20px;">ios</span>
                    Apple
                </button>
</div>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-lg text-label-lg text-primary hover:underline ml-1" href="#">Login</a>
</p>
</div>
</div>
</main>
</body></html>
