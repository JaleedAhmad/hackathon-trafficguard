<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "on-tertiary-fixed-variant": "#7d2d00",

                        "inverse-surface": "#263143",
                        "error": "#ba1a1a",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-high": "#dee8ff",
                        "on-primary-container": "#eeefff",
                        "tertiary-fixed-dim": "#ffb596",
                        "secondary-container": "#d0e1fb",
                        "on-surface": "#111c2d",

                        "on-tertiary-container": "#ffede6",
                        "on-tertiary": "#ffffff",

                        "inverse-on-surface": "#ecf1ff",
                        "primary": "#004ac6",
                        "secondary-fixed-dim": "#b7c8e1",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-bottom": "34px",
                        "gutter-mobile": "16px",
                        "margin-mobile": "16px",
                        "columns-mobile": "4",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "label-sm": ["Inter"],

                    "fontSize": {

            }
        }

<style>
        .pulse-wave {
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }
        .waveform-bar {
            animation: waveform 1s infinite alternate ease-in-out;
        }
        .waveform-bar:nth-child(1) { animation-delay: 0.1s; height: 16px; }
        .waveform-bar:nth-child(2) { animation-delay: 0.3s; height: 32px; }
        .waveform-bar:nth-child(3) { animation-delay: 0.5s; height: 48px; }
        .waveform-bar:nth-child(4) { animation-delay: 0.2s; height: 24px; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; height: 36px; }
        @keyframes waveform {
            0% { transform: scaleY(0.5); }
            100% { transform: scaleY(1.2); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md h-screen w-full overflow-hidden relative">
<!-- Background Map/Navigation Area (Blurred) -->
<div class="absolute inset-0 z-0 bg-cover bg-center blur-sm scale-105" data-alt="A modern GPS navigation map interface displayed on a car dashboard or mobile device, showing a route through a city. The map features clear, bright colors with a dominant primary blue line indicating the path. The surrounding interface is sleek and minimal, fitting a light-mode corporate aesthetic. The overall mood is precise and reliable, typical of high-end navigation software." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBNYSRu4O7tan1XvyIUsBNoIhj14m_v6s3KEn4G-Gm2mJrkU6F-8Sd_8qcoR7Znv93uobZdQYXKIhO0Z5u54lB1Hnr6VKr6ba1aK_LOeP0yYwirUikFpwjSliTRiitmHvrcC3dEnVpoF1rfl5D9KJ2sQ1pFBCZXYk605vQU7NN1oD2rYwE5_8YmmaNx98_fHbGnBz6i7YKbn9xATNgpo0CL18t7wiApZYhX4787spx6ZKZr1ZDbv8FsQ0M3PoNK1iJRkrrRWkA0mg');">
<!-- Mock UI Elements visible through blur -->
<div class="absolute top-16 left-4 right-4 bg-surface/80 p-4 rounded-xl shadow-sm border border-outline-variant/30 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl">directions_car</span>
<div>
<div class="font-headline-md text-headline-md text-on-surface">15 min</div>
<div class="font-body-md text-body-md text-on-surface-variant">to destination</div>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</div>
</div>
<!-- Semi-transparent overlay to dim the background further -->
<div class="absolute inset-0 z-10 bg-surface/60 backdrop-blur-md"></div>
<!-- Voice Assistant Overlay Container -->
<div class="absolute inset-0 z-20 flex flex-col items-center justify-end pb-32">
<!-- Listening Status Text -->
<div class="mb-12 text-center px-6">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Listening...</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant italic">"Navigate home"</p>
</div>
<!-- Voice Visualizer / Mic Icon Area -->
<div class="relative flex items-center justify-center mb-16 h-32 w-full">
<!-- Waveform Visualizer -->
<div class="flex items-center gap-1.5 absolute">
<div class="w-2 bg-primary rounded-full waveform-bar"></div>
<div class="w-2 bg-primary-container rounded-full waveform-bar"></div>
<div class="w-2 bg-primary rounded-full waveform-bar"></div>
<div class="w-2 bg-secondary rounded-full waveform-bar"></div>
<div class="w-2 bg-primary-fixed rounded-full waveform-bar"></div>
</div>
<!-- Pulsing Circles behind Mic -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="absolute w-24 h-24 bg-primary/20 rounded-full pulse-wave"></div>
<div class="absolute w-32 h-32 bg-primary/10 rounded-full pulse-wave" style="animation-delay: 0.5s;"></div>
</div>
<!-- Central Mic Button (Interactive anchor) -->
<button class="relative z-10 w-20 h-20 bg-primary text-on-primary rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.1)] flex items-center justify-center transition-transform active:scale-95">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Supportive Text/Actions -->
<div class="flex gap-4 mb-safe-area-bottom">
<button class="px-6 py-2 bg-surface rounded-full shadow-sm border border-outline-variant text-on-surface font-label-lg text-label-lg flex items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
                Cancel
            </button>
</div>
</div>
</body></html>
