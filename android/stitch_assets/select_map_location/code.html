<body class="bg-surface text-on-surface h-screen w-full overflow-hidden flex flex-col relative font-body-md">
<!-- Top Action Area (Contextual Task - Back Button) -->
<div class="absolute top-0 w-full z-40 p-4 pt-6 flex justify-between items-center pointer-events-none">
<button aria-label="Go Back" class="w-12 h-12 bg-surface rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.1)] flex items-center justify-center text-on-surface pointer-events-auto active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<button class="h-12 px-4 bg-surface rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.1)] flex items-center justify-center text-primary font-label-lg text-label-lg pointer-events-auto active:scale-95 transition-transform duration-200 gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">my_location</span>
            Recenter
        </button>
</div>
<!-- Map Canvas -->
<div class="absolute inset-0 z-0">
<img alt="Map View" class="w-full h-full object-cover" data-alt="A highly detailed, top-down digital street map displaying a dense metropolitan grid. The map utilizes a modern, light-mode aesthetic with soft grey pathways, pale blue rivers, and off-white city blocks. The lighting is flat and uniform, typical of professional navigation software, creating a clean, corporate atmosphere that emphasizes clarity and utility over excessive decoration." data-location="Metropolitan City Center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxyqUgxEB3koLcvnwyp35KgnfsWcYp-DDqd3ocrClDPIylPP6tEhS3Xx0WAOZiWxIuW2HqDAKfocHXDddOKQ0EqVgM5ylgVqi7vczrf9Fr_za7nhd24LtsREz1aE9sQhGoVdRbldYpv1vlELErru_RpEVpmk7LwSZgX5i3v8fgGloNyYXDbWTtXw0PFtMexRdNrvZ2Yl98olrfzLpS_QldcYhoOjsvFNVk2GoXt7cjH9TjriGgCBaHuM9EcCN3JLt6k90euU8Lbw"/>
</div>
<!-- Center Draggable Pin Indicator -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center pointer-events-none">
<span class="material-symbols-outlined text-[56px] text-error drop-shadow-[0_8px_12px_rgba(186,26,26,0.3)] -mb-2" style="font-variation-settings: 'FILL' 1;">location_on</span>
<!-- Shadow base for depth -->
<div class="w-5 h-1.5 bg-black/20 rounded-[50%] blur-[1px]"></div>
</div>
<!-- Interaction Overlay (Simulating draggable area) -->
<div class="absolute inset-0 z-10 cursor-move"></div>
<!-- Bottom Sheet / Confirmation Card -->
<div class="absolute bottom-0 w-full bg-surface rounded-t-[24px] shadow-[0_-10px_40px_rgba(0,0,0,0.15)] z-40 flex flex-col pt-3 pb-[calc(16px+34px)] px-6">
<!-- Drag Handle Indicator -->
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full mx-auto mb-6"></div>
<!-- Sheet Header -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-5">
            Incident Location
        </h1>
<!-- Address Card (Glassmorphism inspired subtle container) -->
<div class="flex items-start gap-4 p-4 bg-surface-container-low border border-surface-container-high rounded-xl mb-6">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0 mt-0.5">
<span class="material-symbols-outlined text-on-primary-fixed-variant" style="font-variation-settings: 'FILL' 1;">push_pin</span>
</div>
<div class="flex flex-col">
<p class="font-body-lg text-body-lg font-medium text-on-surface tracking-tight">
                    Intersection of 4th &amp; Market St
                </p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">
                    Financial District, San Francisco, CA 94103
                </p>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg h-14 rounded-full shadow-md active:scale-[0.98] transition-transform duration-150 flex justify-center items-center gap-2">
            Confirm Location
            <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">check_circle</span>
</button>
