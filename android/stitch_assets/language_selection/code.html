<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Language Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "surface-dim": "#cfdaf2",
                            "on-error-container": "#93000a",
                            "on-secondary-fixed": "#0b1c30",
                            "secondary": "#505f76",
                            "on-primary-fixed-variant": "#003ea8",
                            "on-secondary-fixed-variant": "#38485d",
                            "surface-bright": "#f9f9ff",
                            "inverse-primary": "#b4c5ff",
                            "error-container": "#ffdad6",
                            "surface-tint": "#0053db",
                            "tertiary-container": "#bc4800",
                            "on-secondary-container": "#54647a",
                            "surface-container-lowest": "#ffffff",
                            "background": "#f9f9ff",
                            "on-primary-container": "#eeefff",
                            "outline-variant": "#c3c6d7",
                            "inverse-surface": "#263143",
                            "on-secondary": "#ffffff",
                            "primary-fixed-dim": "#b4c5ff",
                            "surface-container-highest": "#d8e3fb",
                            "on-tertiary-fixed": "#360f00",
                            "on-tertiary-container": "#ffede6",
                            "surface-container-high": "#dee8ff",
                            "surface-container": "#e7eeff",
                            "tertiary-fixed": "#ffdbcd",
                            "outline": "#737686",
                            "tertiary": "#943700",
                            "on-error": "#ffffff",
                            "on-tertiary-fixed-variant": "#7d2d00",
                            "primary-fixed": "#dbe1ff",
                            "on-tertiary": "#ffffff",
                            "surface-container-low": "#f0f3ff",
                            "on-primary": "#ffffff",
                            "tertiary-fixed-dim": "#ffb596",
                            "surface": "#f9f9ff",
                            "secondary-fixed-dim": "#b7c8e1",
                            "secondary-fixed": "#d3e4fe",
                            "on-primary-fixed": "#00174b",
                            "on-surface-variant": "#434655",
                            "on-surface": "#111c2d",
                            "error": "#ba1a1a",
                            "primary": "#004ac6",
                            "inverse-on-surface": "#ecf1ff",
                            "surface-variant": "#d8e3fb",
                            "on-background": "#111c2d",
                            "secondary-container": "#d0e1fb",
                            "primary-container": "#2563eb"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.25rem",
                            "lg": "0.5rem",
                            "xl": "0.75rem",
                            "full": "9999px"
                    },
                    "spacing": {
                            "unit": "8px",
                            "gutter-mobile": "16px",
                            "columns-mobile": "4",
                            "margin-mobile": "16px",
                            "safe-area-bottom": "34px"
                    },
                    "fontFamily": {
                            "label-lg": ["Inter"],
                            "display-lg": ["Hanken Grotesk"],
                            "headline-md": ["Hanken Grotesk"],
                            "body-md": ["Inter"],
                            "headline-lg": ["Hanken Grotesk"],
                            "label-sm": ["Inter"],
                            "headline-lg-mobile": ["Hanken Grotesk"],
                            "body-lg": ["Inter"]
                    },
                    "fontSize": {
                            "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                            "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                            "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans antialiased selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Top AppBar (Simplified for Onboarding/Transactional flow) -->
<header class="w-full flex items-center h-16 px-gutter-mobile sticky top-0 bg-background/80 backdrop-blur-md z-40">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low text-on-surface transition-colors">
<span aria-hidden="true" class="material-symbols-outlined">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-gutter-mobile pt-8 pb-32 flex flex-col gap-8">
<!-- Header Section -->
<div class="flex flex-col gap-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Select Language</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Choose your preferred language for the application interface.</p>
</div>
<!-- Language List (Bento-inspired touch targets) -->
<div aria-labelledby="language-selection" class="flex flex-col gap-3" role="radiogroup">
<!-- Option: English (Selected State) -->
<label class="relative flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-200 bg-surface-container-low border-2 border-primary shadow-sm group">
<input checked="" class="sr-only" name="language" type="radio" value="english"/>
<span class="font-body-lg text-body-lg text-primary font-medium">English</span>
<div class="w-6 h-6 rounded-full flex items-center justify-center text-primary">
<span aria-hidden="true" class="material-symbols-outlined fill">check_circle</span>
</div>
</label>
<!-- Option: Spanish -->
<label class="relative flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-200 bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low hover:border-outline group">
<input class="sr-only" name="language" type="radio" value="spanish"/>
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-on-surface-variant">Spanish</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-outline transition-colors"></div>
</label>
<!-- Option: French -->
<label class="relative flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-200 bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low hover:border-outline group">
<input class="sr-only" name="language" type="radio" value="french"/>
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-on-surface-variant">French</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-outline transition-colors"></div>
</label>
<!-- Option: German -->
<label class="relative flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-200 bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low hover:border-outline group">
<input class="sr-only" name="language" type="radio" value="german"/>
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-on-surface-variant">German</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-outline transition-colors"></div>
</label>
<!-- Option: Chinese -->
<label class="relative flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-200 bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low hover:border-outline group">
<input class="sr-only" name="language" type="radio" value="chinese"/>
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-on-surface-variant">Chinese</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-outline transition-colors"></div>
</label>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background via-background to-transparent pt-8 pb-safe-area-bottom px-gutter-mobile z-50">
<div class="max-w-md mx-auto mb-4">
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-label-lg text-label-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Continue
                <span aria-hidden="true" class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
