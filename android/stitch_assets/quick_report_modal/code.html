<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-hidden h-[812px] w-[375px] mx-auto border border-outline-variant rounded-[40px] shadow-2xl">
<!-- Mock Map Background -->
<div class="absolute inset-0 bg-cover bg-center z-0" data-alt="A stylized, overhead view of a digital map interface showing city streets and blocks. The map is designed with a light mode aesthetic, featuring soft grey roads on an off-white background, with subtle blue and green accents indicating parks and water bodies. The lighting suggests daytime clarity, suitable for a modern navigation app interface, creating a calm and structured mood." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCPMWrcCGlOZPWMYmHBYcwiDQ8n8EIs9lIwsBlO4fPs3u7Sw1YnspU_3Nq4LJPmrkZaj481m_NJViGoBBaoC-HQ7RNyhSa5nL-b61SLsv2C5J4THt7dRxxdJRsck-D7qlSLi_uk4CqkH9ifj-ncayjhrnJ9vi8f2ZE1qY_b1ti7gvOCVDBI2Wlzck0iAPlpQB8VPO1nSw_eDrlBQmxo3jgHDXilgbiEqm6_0XyDA5YPChf9frTHYdQ4xxM71WVEfQg20IZJ0haoJg');">
<!-- Mock Map Markers -->
<div class="absolute top-1/4 left-1/3 w-8 h-8 bg-primary rounded-full border-2 border-surface flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-primary text-[16px]" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
<div class="absolute top-1/2 left-2/3 w-6 h-6 bg-secondary-container rounded-full border-2 border-surface flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-on-secondary-container text-[12px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Semi-transparent overlay to dim map -->
<div class="absolute inset-0 bg-on-background/40 z-10 backdrop-blur-[2px]"></div>
<!-- Bottom Sheet Modal -->
<div class="absolute bottom-0 left-0 w-full bg-surface rounded-t-3xl shadow-[0_-10px_25px_rgba(0,0,0,0.1)] z-20 pb-[calc(16px+34px)] pt-2 px-margin-mobile flex flex-col">
<!-- Drag Handle -->
<div class="w-12 h-1 bg-outline-variant rounded-full mx-auto mb-4"></div>
<!-- Header -->
<div class="flex justify-between items-center mb-6">
<h1 class="font-headline-md text-headline-md text-on-surface">Report Incident</h1>
<button class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Incident Grid (Bento style for quick access) -->
<div class="grid grid-cols-2 gap-4">
<!-- Accident Card -->
<button class="bg-error-container/20 border border-error-container rounded-2xl p-4 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-error flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-error text-[32px]" style="font-variation-settings: 'FILL' 1;">car_crash</span>
</div>
<span class="font-label-lg text-label-lg text-error">Accident</span>
</button>
<!-- Hazard Card -->
<button class="bg-tertiary-container/10 border border-tertiary-container/30 rounded-2xl p-4 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-tertiary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-tertiary text-[32px]" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<span class="font-label-lg text-label-lg text-tertiary">Hazard</span>
</button>
<!-- Police Card -->
<button class="bg-primary-container/10 border border-primary-container/30 rounded-2xl p-4 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">local_police</span>
</div>
<span class="font-label-lg text-label-lg text-primary">Police</span>
</button>
<!-- Traffic Card -->
<button class="bg-secondary-container/30 border border-secondary-container rounded-2xl p-4 flex flex-col items-center justify-center gap-3 active:scale-95 transition-transform">
<div class="w-16 h-16 rounded-full bg-secondary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-secondary text-[32px]" style="font-variation-settings: 'FILL' 1;">traffic</span>
</div>
<span class="font-label-lg text-label-lg text-secondary">Traffic</span>
</button>
</div>
<!-- Secondary Action -->
<button class="mt-6 w-full py-3 bg-surface-container-high text-on-surface font-label-lg text-label-lg rounded-xl hover:bg-surface-variant transition-colors border border-outline-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">add_circle</span>
            Other Incident Type
        </button>
</div>
</body></html>
